services:
  broker:
    image: bitnami/kafka:latest
    hostname: broker
    container_name: broker
    ports:
      - '9092:9092'
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://broker:9092
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@broker:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 10

  admin-server:
    image: admin-server:0.0.1-SNAPSHOT
    ports:
      - "9090:9090"
    hostname: admin-server
    container_name: admin-server
    depends_on:
      broker:
        condition: service_healthy

  source:
    image: cashcard-transaction-source:0.0.1-SNAPSHOT
    ports:
      - "8080:8080"
    hostname: source
    container_name: source
    depends_on:
      broker:
        condition: service_healthy

  enricher:
    image: cashcard-transaction-enricher:0.0.1-SNAPSHOT
    ports:
      - "8084:8084"
    hostname: enricher
    container_name: enricher
    depends_on:
      broker:
        condition: service_healthy

  sink:
    image: cashcard-transaction-sink:0.0.1-SNAPSHOT
    ports:
      - "8082:8082"
    hostname: sink
    container_name: sink
    depends_on:
      broker:
        condition: service_healthy